header:
  version: 8


repos:

  poky:
    url: https://git.yoctoproject.org/git/poky
    refspec: d3ad6a22dbb8b9a21d7fe11bf437a20dea95ec81 
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: http://git.openembedded.org/meta-openembedded
    refspec: 2a5c534d2b9f01e9c0f39701fccd7fc874945b1c
    layers:
      meta-oe:
      meta-networking:
      meta-filesystems:
      meta-python:
      meta-perl:

  meta-security:
    url: https://git.yoctoproject.org/git/meta-security
    refspec: c74cc97641fd93e0e7a4383255e9a0ab3deaf9d7
    layers:
      meta-tpm:

  meta-selinux:
    url: https://git.yoctoproject.org/git/meta-selinux
    refspec: 7af62c91d7d00a260cf28e7908955539304d100d

  meta-secure-core:
    url: https://github.com/jiazhang0/meta-secure-core
    refspec: 628949305cdffff6798330d58e3d8c2bcf5c89f3
    layers:
      meta:
      meta-signing-key:
      meta-efi-secure-boot:

  meta-safeboot:
    url: https://github.com/3mdeb/meta-safeboot
    refspec: f3d9d7a65b363ce2d75b8f2d4f66703e46df0def

  meta-trenchboot:


bblayers_conf_header:
  standard: |
    POKY_BBLAYERS_CONF_VERSION = "2"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""
    LICENSE_FLAGS_WHITELIST = "commercial"
local_conf_header:
  standard: |
    CONF_VERSION = "1"
    PACKAGE_CLASSES = "package_rpm"
    SDKMACHINE = "x86_64"
    USER_CLASSES = "buildstats image-mklibs image-prelink"
    PATCHRESOLVE = "noop"
  debug-tweaks: |
    EXTRA_IMAGE_FEATURES = "debug-tweaks"
  diskmon: |
    BB_DISKMON_DIRS = "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        STOPTASKS,/tmp,100M,100K \
        ABORT,${TMPDIR},100M,1K \
        ABORT,${DL_DIR},100M,1K \
        ABORT,${SSTATE_DIR},100M,1K \
        ABORT,/tmp,10M,1K"
  oe-layer-priority: |
    BBFILE_PRIORITY_openembedded-layer = "4"
